<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Xavier Public School - Result Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="School Logo" class="logo">
            <h1>St. Xavier Public School</h1>
            <p>Result Portal 2025</p>
        </header>
        <main>
            <div class="form-container">
                <h2>Check Your Result</h2>
                <form id="resultForm">
                    <label for="rollNo">Roll Number:</label>
                    <input type="text" id="rollNo" placeholder="Enter Roll Number" required>
                    
                    <label for="mobile">Mobile Number:</label>
                    <input type="tel" id="mobile" placeholder="Enter Mobile Number" required>
                    
                    <button type="submit">Check Result</button>
                </form>
                <div id="resultOutput" class="result-output"></div>
            </div>
        </main>
        <footer>
            <p>© 2025 results.nest.in . All Rights Reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
